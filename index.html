<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POWERPLAY | Live Hockey Challenge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            overflow-x: hidden;
        }
        .oswald {
            font-family: 'Oswald', sans-serif;
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b;
        }
        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 3px;
        }
        @keyframes flash-green {
          0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); filter: brightness(1); transform: scale(1); }
          20% { box-shadow: 0 0 40px 20px rgba(34, 197, 94, 0.9); filter: brightness(1.8); transform: scale(1.15); }
          100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); filter: brightness(1); transform: scale(1); }
        }
        @keyframes flash-red {
          0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); filter: brightness(1); transform: scale(1); }
          20% { box-shadow: 0 0 40px 20px rgba(239, 68, 68, 0.9); filter: brightness(1.8); transform: scale(1.15); }
          100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); filter: brightness(1); transform: scale(1); }
        }
        .animate-flash-green { animation: flash-green 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) both; }
        .animate-flash-red { animation: flash-red 1s cubic-bezier(0.25, 0.46, 0.45, 0.94) both; }
    </style>
